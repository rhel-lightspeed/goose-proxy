name: Release vendor wheels

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  vendor:
    name: Build and upload vendor tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build vendor tarball
        run: packaging/vendor-wheels.sh

      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release upload "${{ github.event.release.tag_name }}" packaging/vendor-wheels.tar.gz
          --clobber
