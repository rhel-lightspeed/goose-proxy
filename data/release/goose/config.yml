extensions:
  linux-tools:
    enabled: true
    type: stdio
    name: linux-tools
    description: Linux Tools
    cmd: linux-mcp-server
    args: []
    envs:
      LINUX_MCP_ALLOWED_LOG_PATHS: /var/log/messages
    env_keys: []
    timeout: 30
    bundled: null
    available_tools: []
  extensionmanager:
    enabled: true
    type: platform
    name: Extension Manager
    description: Enable extension management tools for discovering, enabling, and disabling extensions
    display_name: Extension Manager
    bundled: true
    available_tools: []
  developer:
    enabled: false
    type: builtin
    name: developer
    description: Write and edit files, and execute shell commands
    display_name: Developer
    timeout: null
    bundled: true
    available_tools: []
  apps:
    enabled: false
    type: platform
    name: apps
    description: Create and manage custom Goose apps through chat. Apps are HTML/CSS/JavaScript and run in sandboxed windows.
    display_name: Apps
    bundled: true
    available_tools: []
  summon:
    enabled: false
    type: platform
    name: summon
    description: Load knowledge and delegate tasks to subagents
    display_name: Summon
    bundled: true
    available_tools: []
  chatrecall:
    enabled: true
    type: platform
    name: chatrecall
    description: Search past conversations and load session summaries for contextual memory
    display_name: Chat Recall
    bundled: true
    available_tools: []
  code_execution:
    enabled: false
    type: platform
    name: code_execution
    description: Goose will make extension calls through code execution, saving tokens
    display_name: Code Mode
    bundled: true
    available_tools: []
  tom:
    enabled: false
    type: platform
    name: tom
    description: Inject custom context into every turn via GOOSE_MOIM_MESSAGE_TEXT and GOOSE_MOIM_MESSAGE_FILE environment variables
    display_name: Top Of Mind
    bundled: true
    available_tools: []
  todo:
    enabled: false
    type: platform
    name: todo
    description: Enable a todo list for goose so it can keep track of what it is doing
    display_name: Todo
    bundled: true
    available_tools: []
GOOSE_CONTEXT_STRATEGY: prompt
GOOSE_DISABLE_SESSION_NAMING: true
GOOSE_MAX_TOKENS: 16000
GOOSE_MAX_TURNS: 200
GOOSE_MODE: approve
GOOSE_MOIM_MESSAGE_TEXT: "You are a Red Hat Enterprise Linux expert."
GOOSE_RANDOM_THINKING_MESSAGES: false
GOOSE_SUBAGENT_MAX_TURNS: 25
GOOSE_TELEMETRY_ENABLED: false
OTEL_SDK_DISABLED: true
SECURITY_PROMPT_ENABLED: true
SECURITY_PROMPT_THRESHOLD: 0.9
OPENAI_HOST: http://127.0.0.1:8080
OPENAI_BASE_PATH: v1/chat/completions
GOOSE_PROVIDER: custom_goose-proxy
GOOSE_MODEL: RHEL-command-line-assistant