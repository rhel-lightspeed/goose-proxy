# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US

early_access: true

reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  collapse_walkthrough: false
  sequence_diagrams: true

  path_instructions:
    - path: "src/goose_proxy/**"
      instructions: |
        This is a FastAPI proxy that translates OpenAI Chat Completions API
        requests to a backend LLM inference service (lightspeed-stack) with
        RHSM certificate authentication.

        Review for:
        - Correct Pydantic model usage and validation (v2 API only).
        - Proper async/await patterns with httpx.
        - Timeout handling — the proxy has request timeout middleware; ensure
          new code respects it and doesn't introduce unguarded blocking calls.
        - Configuration via pydantic-settings and TOML; no hardcoded values.
        - Error responses must follow the OpenAI-compatible format defined in
          error_handlers.py.
        - RHEL compatibility: Python 3.9+ (no walrus operators in complex
          expressions, no match/case, etc.).

    - path: "src/goose_proxy/routers/**"
      instructions: |
        API route handlers. Ensure:
        - Request/response models are defined in models.py, not inline.
        - Endpoints follow OpenAI API conventions for path structure and
          response shape.
        - No secrets or credentials leak into responses or logs.

    - path: "tests/**"
      instructions: |
        Tests use pytest with pytest-asyncio and the responses library for
        HTTP mocking. Ensure:
        - Async tests use the correct pytest-asyncio markers.
        - HTTP interactions with the backend are mocked, never real.
        - Tests cover both success and error paths.

    - path: "pyproject.toml"
      instructions: |
        This project targets RHEL 9 and 10 (Python >=3.9,<4.0). Ensure new
        dependencies are compatible with this range. The project uses
        setuptools as the build backend and uv as the package manager.

    - path: "**/*.spec"
      instructions: |
        RPM spec files for RHEL packaging. Validate version bumps, changelog
        entries, and dependency declarations match pyproject.toml.

  tools:
    ruff:
      enabled: true
    # Note: mypy is configured via pre-commit (not available as CodeRabbit tool)

  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: auto
  issues:
    scope: auto
  jira:
    project_keys: []
  linear:
    team_keys: []
  pull_requests:
    scope: auto
