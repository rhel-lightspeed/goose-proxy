name: Release vendor wheels

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  vendor:
    name: Build and upload vendor tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Build vendor tarball
        run: packaging/vendor-wheels.sh

      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release upload "${{ github.event.release.tag_name }}" packaging/vendor-wheels.tar.gz
          --clobber
