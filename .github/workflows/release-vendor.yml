name: Release vendor wheels

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  vendor:
    name: Build and upload vendor tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"

      - name: Build vendor tarball
        run: packaging/vendor-wheels.sh

      - name: Upload to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release upload "${{ github.event.release.tag_name }}" packaging/vendor-wheels.tar.gz
          --clobber
