# Backend settings for communicating with the external API.
[backend]
# The endpoint points to an API server.
endpoint = "http://localhost:8000"
# HTTP request timeout in seconds (increase for CPU inference)
timeout = 30
# Define a proxy to route requests through.
# The proxy also accepts `username:password@localhost:8002` as its input
#proxy = "http://proxy:1234"

# Configure authentication settings for backend
[backend.auth]
# The path to the certificate file generated by RHSM.
cert_file = "data/development/auth/cert.pem"
# The path to the key file generated by RHSM.
key_file = "data/development/auth/key.pem"

# Logging configuration settings
[logging]
# The default logging level for all messages logged by goose-proxy.
level = "DEBUG"

[server]
reload = true
